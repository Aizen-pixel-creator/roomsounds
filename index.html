<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoomSoundscape - AI Visual Audio Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/segmenter/segmenter.js" crossorigin="anonymous"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/tone@14.8.49/build/Tone.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        * { font-family: 'Orbitron', monospace; }
        body { background: radial-gradient(ellipse at center, #0a0a23 0%, #000000 70%); overflow: hidden; }
        .glow { box-shadow: 0 0 20px rgba(0,255,255,0.5), inset 0 0 20px rgba(0,255,255,0.1); }
        .neon-blue { box-shadow: 0 0 30px #00ffff, 0 0 60px #00ffff; }
        .neon-purple { box-shadow: 0 0 30px #8b00ff, 0 0 60px #8b00ff; }
        .scanline::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(90deg, transparent 98%, rgba(0,255,255,0.1) 100%); animation: scan 2s linear infinite; }
        @keyframes scan { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
        .particle { position: absolute; width: 4px; height: 4px; background: #00ffff; border-radius: 50%; animation: float 6s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0px) rotate(0deg); opacity: 1; } 50% { transform: translateY(-20px) rotate(180deg); opacity: 0.5; } }
        canvas { filter: contrast(1.2) brightness(1.1) saturate(1.3); }
    </style>
</head>
<body class="h-screen w-screen flex items-center justify-center p-4 text-white">
    
    <!-- API Key Input -->
    <div id="apiKeyModal" class="fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-50">
        <div class="bg-gray-900 p-8 rounded-2xl border-2 border-cyan-500 glow text-center max-w-md w-full mx-4">
            <h1 class="text-3xl font-bold bg-gradient-to-r from-cyan-400 to-purple-500 bg-clip-text text-transparent mb-6">🚀 RoomSoundscape</h1>
            <p class="text-cyan-300 mb-6">Paste your <strong>Groq API Key</strong> to start:</p>
            <input id="apiKeyInput" type="password" placeholder="gsk_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxx" class="w-full p-4 bg-gray-800 border-2 border-cyan-500 rounded-xl text-white text-lg mb-6 glow focus:outline-none focus:border-cyan-400">
            <div class="flex gap-4">
                <button onclick="saveApiKey()" class="flex-1 bg-gradient-to-r from-cyan-500 to-blue-500 hover:from-cyan-400 hover:to-blue-400 px-6 py-3 rounded-xl font-bold text-lg neon-blue transition-all duration-300">🎵 Start Listening</button>
                <button onclick="document.getElementById('apiKeyModal').style.display='none'" class="flex-1 bg-gray-700 hover:bg-gray-600 px-6 py-3 rounded-xl font-bold">✕ Cancel</button>
            </div>
            <p class="text-xs text-gray-400 mt-4">Get your key at <a href="https://console.groq.com/keys" target="_blank" class="text-cyan-400 hover:text-cyan-300">console.groq.com</a></p>
        </div>
    </div>

    <!-- Main UI -->
    <div id="mainUI" class="w-full h-full max-w-7xl mx-auto flex flex-col lg:flex-row gap-6 relative">
        
        <!-- Left Panel - Controls -->
        <div id="controlsPanel" class="lg:w-80 flex flex-col gap-6 h-full">
            <div class="bg-gray-900/80 backdrop-blur-xl rounded-3xl p-8 border-2 border-cyan-500/50 glow">
                <h2 class="text-2xl font-bold bg-gradient-to-r from-cyan-400 to-purple-500 bg-clip-text mb-6">🎧 Soundscape Engine</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm text-cyan-300 mb-2">Volume</label>
                        <input type="range" id="volume" min="0" max="1" step="0.1" value="0.7" class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-cyan-500 [&::-webkit-slider-thumb]:h-6 [&::-webkit-slider-thumb]:w-6 [&::-webkit-slider-thumb]:rounded-full [&::-webkit-slider-thumb]:bg-cyan-500 [&::-webkit-slider-thumb]:shadow-lg">
                    </div>
                    <div>
                        <label class="block text-sm text-cyan-300 mb-2">Intensity</label>
                        <input type="range" id="intensity" min="0.1" max="2" step="0.1" value="1" class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-purple-500 [&::-webkit-slider-thumb]:h-6 [&::-webkit-slider-thumb]:w-6 [&::-webkit-slider-thumb]:rounded-full [&::-webkit-slider-thumb]:bg-purple-500 [&::-webkit-slider-thumb]:shadow-lg">
                    </div>
                    <button id="recordBtn" class="w-full bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 px-6 py-4 rounded-2xl font-bold text-lg neon-purple transition-all duration-300 flex items-center justify-center gap-3 shadow-2xl hover:scale-105">
                        🎙️ Record Soundscape
                    </button>
                    <button onclick="toggleFullScreen()" class="w-full bg-gradient-to-r from-green-600 to-emerald-600 hover:from-green-500 hover:to-emerald-500 px-6 py-3 rounded-xl font-bold neon-blue transition-all duration-300 flex items-center justify-center gap-2">
                        ↔️ Fullscreen
                    </button>
                </div>
            </div>
            
            <!-- Detected Objects -->
            <div class="bg-gray-900/80 backdrop-blur-xl rounded-3xl p-6 border-2 border-purple-500/50 glow flex-1">
                <h3 class="text-xl font-bold text-purple-400 mb-4 flex items-center gap-2">🎯 Detected Elements</h3>
                <div id="objectsList" class="space-y-2 max-h-64 overflow-y-auto"></div>
            </div>
        </div>

        <!-- Right Panel - Visualizer -->
        <div class="flex-1 relative h-full min-h-[400px] lg:min-h-[600px] rounded-3xl overflow-hidden border-4 border-cyan-500/30 glow">
            <div class="scanline relative z-10"></div>
            <video id="webcam" class="w-full h-full object-cover rounded-2xl absolute inset-0" autoplay playsinline muted></video>
            <canvas id="outputCanvas" class="w-full h-full absolute inset-0"></canvas>
            <div id="visualizerOverlay" class="absolute inset-0 bg-gradient-radial from-cyan-500/20 via-transparent to-purple-500/20"></div>
            
            <!-- Status -->
            <div class="absolute top-6 left-6 bg-black/70 backdrop-blur-xl px-6 py-3 rounded-2xl border border-cyan-500/50 text-sm">
                <div id="statusText" class="font-mono text-cyan-400">Initializing AI Vision...</div>
            </div>
            
            <!-- Particles -->
            <div id="particles"></div>
        </div>
    </div>

    <script>
        // === PASTE YOUR GROQ API KEY HERE ===
        let GROQ_API_KEY = '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';
        
        // Audio Engine
        let synth, drone1, drone2, reverb, distortion, autoFilter;
        let isRecording = false;
        let mediaRecorder, recordedChunks = [];
        
        // Vision
        let camera, segmenter;
        let rafId;
        
        // Particles
        let particles = [];
        
        // State
        let detectedObjects = [];
        let dominantColors = [];
        let isInitialized = false;

        async function initAudio() {
            await Tone.start();
            
            // Create soundscape instruments
            synth = new Tone.Synth({
                oscillator: { type: "fatsawtooth", spread: 20 },
            }).toDestination();
            
            drone1 = new Tone.Synth({
                oscillator: { type: "sine" }
            }).toDestination();
            
            drone2 = new Tone.Synth({
                oscillator: { type: "triangle" }
            }).toDestination();
            
            reverb = new Tone.Reverb(8).toDestination();
            distortion = new Tone.Distortion(0.1).toDestination();
            autoFilter = new Tone.AutoFilter({
                frequency: 200,
                baseFrequency: 100,
                octaves: 4
            }).start();
            
            synth.connect(reverb);
            drone1.connect(distortion);
            drone2.connect(autoFilter);
            
            // Volume control
            document.getElementById('volume').addEventListener('input', (e) => {
                Tone.Destination.volume.value = Tone.gainToDb(e.target.value);
            });
            
            document.getElementById('intensity').addEventListener('input', (e) => {
                updateSoundscapeIntensity(parseFloat(e.target.value));
            });
        }

        async function initVision() {
            const video = document.getElementById('webcam');
            const canvas = document.getElementById('outputCanvas');
            const ctx = canvas.getContext('2d');
            
            camera = new Camera(video, {
                onFrame: async () => {
                    await predict();
                },
                width: 640,
                height: 480
            });
            camera.start();
            
            // MediaPipe Segmenter
            segmenter = await window.Segmentation.createFromOptions({
                baseOptions: {
                    modelAssetPath: `https://storage.googleapis.com/mediapipe-models/selfie_segmenter/selfie_landmarker/float16/1/selfie_segmenter.task`
                },
            });
            
            function renderLoop() {
                canvas.width = canvas.clientWidth;
                canvas.height = canvas.clientHeight;
                
                ctx.save();
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                ctx.restore();
                
                rafId = requestAnimationFrame(renderLoop);
            }
            renderLoop();
        }

        async function predict() {
            if (!segmenter || !GROQ_API_KEY) return;
            
            const video = document.getElementById('webcam');
            const results = await segmenter.segment(video);
            
            if (results) {
                analyzeFrame(results);
                analyzeColors(video);
                generateSoundscape();
            }
        }

        function analyzeFrame(results) {
            // Extract dominant colors and objects using canvas analysis
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 320;
            canvas.height = 240;
            ctx.drawImage(document.getElementById('webcam'), 0, 0, 320, 240);
            
            const imageData = ctx.getImageData(0, 0, 320, 240);
            dominantColors = getDominantColors(imageData);
            
            // Simulate object detection with color regions
            detectedObjects = dominantColors.map((color, i) => ({
                id: i,
                name: getObjectNameFromColor(color),
                color: color,
                confidence: Math.random() * 0.3 + 0.7,
                position: { x: Math.random() * 100, y: Math.random() * 100 }
            }));
            
            updateObjectsUI();
        }

        function getDominantColors(imageData, count = 5) {
            const pixels = imageData.data;
            const colorMap = {};
            
            for (let i = 0; i < pixels.length; i += 4) {
                const r = pixels[i], g = pixels[i+1], b = pixels[i+2];
                const key = `${Math.round(r/32)*32},${Math.round(g/32)*32},${Math.round(b/32)*32}`;
                colorMap[key] = (colorMap[key] || 0) + 1;
            }
            
            return Object.entries(colorMap)
                .sort(([,a], [,b]) => b - a)
                .slice(0, count)
                .map(([key, count]) => {
                    const [r,g,b] = key.split(',').map(Number);
                    return { r: r/255, g: g/255, b: b/255, count };
                });
        }

        function getObjectNameFromColor(color) {
            const hue = Math.atan2(color.b - 0.5, color.r - 0.5) * 180 / Math.PI + 180;
            if (hue < 30 || hue > 330) return "Warm Light";
            if (hue < 90) return "Green Plant";
            if (hue < 150) return "Blue Object";
            if (hue < 210) return "Purple Decor";
            if (hue < 270) return "Dark Surface";
            return "Bright Highlight";
        }

        function analyzeColors(video) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 100;
            canvas.height = 100;
            ctx.drawImage(video, 0, 0, 100, 100);
            
            const imageData = ctx.getImageData(0, 0, 100, 100);
            const colors = getDominantColors(imageData, 3);
            
            // Update visualizer background
            const mainColor = colors[0];
            if (mainColor) {
                const overlay = document.getElementById('visualizerOverlay');
                overlay.style.background = `radial-gradient(circle at 30% 30%, rgb(${mainColor.r*255},${mainColor.g*255},${mainColor.b*255},0.3), transparent 70%), radial-gradient(circle at 70% 70%, rgb(${mainColor.r*255*0.7},${mainColor.g*255*0.7},${mainColor.b*255*0.7},0.2), transparent 70%)`;
            }
        }

        function generateSoundscape() {
            if (detectedObjects.length === 0) return;
            
            const intensity = parseFloat(document.getElementById('intensity').value);
            
            // Map colors to frequencies
            detectedObjects.forEach((obj, index) => {
                const hue = Math.atan2(obj.color.b - 0.5, obj.color.r - 0.5) * 180 / Math.PI + 180;
                const freq = Tone.Frequency.mtof(36 + (hue / 360) * 48 + Math.sin(Date.now() * 0.001 + index) * 12);
                
                // Drone tones
                if (index % 3 === 0) {
                    drone1.triggerAttackRelease(freq * 0.5, "4n");
                } else if (index % 3 === 1) {
                    drone2.triggerAttackRelease(freq * 0.7, "4n");
                } else {
                    synth.triggerAttackRelease(freq, "8n", Tone.now() + index * 0.1);
                }
            });
            
            // Dynamic effects
            autoFilter.frequency.value = 100 + Math.sin(Date.now() * 0.002) * 200;
            distortion.distortion = 0.1 + Math.sin(Date.now() * 0.003) * 0.2;
        }

        function updateSoundscapeIntensity(intensity) {
            synth.volume.value = Tone.gainToDb(intensity * 0.5);
            drone1.volume.value = Tone.gainToDb(intensity * 0.3);
            drone2.volume.value = Tone.gainToDb(intensity * 0.3);
        }

        function updateObjectsUI() {
            const list = document.getElementById('objectsList');
            list.innerHTML = detectedObjects.map(obj => `
                <div class="flex items-center justify-between p-3 bg-gray-800/50 rounded-xl border-l-4" style="border-left-color: rgb(${obj.color.r*255},${obj.color.g*255},${obj.color.b*255})">
                    <div class="flex items-center gap-3">
                        <div class="w-4 h-4 rounded-full" style="background: rgb(${obj.color.r*255},${obj.color.g*255},${obj.color.b*255})"></div>
                        <span>${obj.name}</span>
                    </div>
                    <span class="text-xs text-gray-400">${Math.round(obj.confidence * 100)}%</span>
                </div>
            `).join('');
        }

        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 6 + 's';
                particle.style.animationDuration = (4 + Math.random() * 4) + 's';
                container.appendChild(particle);
                particles.push(particle);
            }
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        async function startRecording() {
            const stream = canvas.captureStream(30);
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
            
            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) recordedChunks.push(e.data);
            };
            
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'audio/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `room-soundscape-${Date.now()}.webm`;
                a.click();
                recordedChunks = [];
            };
            
            mediaRecorder.start();
            isRecording = true;
            document.getElementById('recordBtn').textContent = '⏹️ Stop Recording';
            document.getElementById('recordBtn').className = 'w-full bg-gradient-to-r from-red-600 to-rose-600 hover:from-red-500 hover:to-rose-500 px-6 py-4 rounded-2xl font-bold text-lg neon-purple transition-all duration-300 flex items-center justify-center gap-3 shadow-2xl hover:scale-105';
        }

        function stopRecording() {
            mediaRecorder.stop();
            isRecording = false;
            document.getElementById('recordBtn').textContent = '🎙️ Record Soundscape';
            document.getElementById('recordBtn').className = 'w-full bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 px-6 py-4 rounded-2xl font-bold text-lg neon-purple transition-all duration-300 flex items-center justify-center gap-3 shadow-2xl hover:scale-105';
        }

        document.getElementById('recordBtn').addEventListener('click', () => {
            if (!isRecording) startRecording();
            else stopRecording();
        });

        function saveApiKey() {
            GROQ_API_KEY = document.getElementById('apiKeyInput').value;
            if (!GROQ_API_KEY) {
                alert('Please enter your Groq API key!');
                return;
            }
            localStorage.setItem('groq_api_key', GROQ_API_KEY);
            document.getElementById('apiKeyModal').style.display = 'none';
            initApp();
        }

        async function initApp() {
            GROQ_API_KEY = localStorage.getItem('groq_api_key') || '';
            if (!GROQ_API_KEY) {
                document.getElementById('apiKeyModal').style.display = 'flex';
                return;
            }
            
            document.getElementById('mainUI').style.display = 'flex';
            document.getElementById('apiKeyModal').style.display = 'none';
            
            await initAudio();
            await initVision();
            createParticles();
            
            document.getElementById('statusText').textContent = '🎵 Listening to your room...';
            isInitialized = true;
            
            // Animate status
            setInterval(() => {
                const status = document.getElementById('statusText');
                status.style.opacity = status.style.opacity === '0.5' ? '1' : '0.5';
            }, 1000);
        }

        // Start app
        window.addEventListener('load', initApp);
        
        // Handle fullscreen change
        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                document.body.classList.add('lg:flex-col');
            } else {
                document.body.classList.remove('lg:flex-col');
            }
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                document.getElementById('recordBtn').click();
            }
            if (e.code === 'KeyF') {
                e.preventDefault();
                toggleFullScreen();
            }
        });
    </script>
</body>
</html>
