<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoVision AI | Ambient Soundscape</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        #container { position: relative; width: 100vw; height: 100vh; }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        video { opacity: 0.3; filter: grayscale(100%) contrast(150%); }
        
        #ui { position: absolute; bottom: 20px; left: 20px; z-index: 10; pointer-events: none; }
        .status { background: rgba(0,0,0,0.6); padding: 10px; border-radius: 8px; border-left: 4px solid #00ffcc; }
        #setup { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; background: #111; padding: 40px; border-radius: 20px; z-index: 100;
        }
        input { padding: 10px; width: 300px; border-radius: 5px; border: none; margin: 10px 0; }
        button { padding: 10px 25px; background: #00ffcc; border: none; cursor: pointer; font-weight: bold; border-radius: 5px; }
    </style>
</head>
<body>

<div id="setup">
    <h1>ECHOVISION</h1>
    <p>Real-time Audio-Visual Synthesis</p>
    <input type="password" id="apiKey" placeholder="Enter Groq API Key">
    <br>
    <button onclick="startApp()">INITIALIZE SYSTEM</button>
</div>

<div id="container">
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="visualizer"></canvas>
    <div id="ui">
        <div class="status">
            <div id="detected">Detecting scene...</div>
            <div id="audio-state">Synth: Idle</div>
        </div>
    </div>
</div>

<script>
    let model, video, canvas, ctx, synth, reverb;
    let isRunning = false;
    let detectedObjects = [];

    async function startApp() {
        const key = document.getElementById('apiKey').value;
        if(!key) return alert("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");
        
        document.getElementById('setup').style.display = 'none';
        
        // 1. Initialize Audio
        await Tone.start();
        reverb = new Tone.Reverb(3).toDestination();
        synth = new Tone.PolySynth(Tone.Synth).connect(reverb);
        synth.set({ oscillator: { type: "sine" }, envelope: { attack: 2, release: 4 } });

        // 2. Initialize Camera
        video = document.getElementById('webcam');
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;

        // 3. Load Model
        model = await cocoSsd.load();
        
        canvas = document.getElementById('visualizer');
        ctx = canvas.getContext('2d');
        resize();
        window.onresize = resize;

        isRunning = true;
        detectFrame();
        setInterval(() => updateSoundscape(key), 5000); // Sync with AI every 5 seconds
    }

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    async function detectFrame() {
        if(!isRunning) return;
        
        const predictions = await model.detect(video);
        detectedObjects = predictions;
        
        // Render Visualizer
        drawVisuals(predictions);
        requestAnimationFrame(detectFrame);
    }

    function drawVisuals(predictions) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        predictions.forEach(p => {
            const [x, y, width, height] = p.bbox;
            // Draw reactive glow
            const gradient = ctx.createRadialGradient(x + width/2, y + height/2, 5, x + width/2, y + height/2, width);
            gradient.addColorStop(0, 'rgba(0, 255, 204, 0.2)');
            gradient.addColorStop(1, 'transparent');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = '#00ffcc';
            ctx.lineWidth = 2;
            ctx.strokeRect(x, y, width, height);
            ctx.fillStyle = '#00ffcc';
            ctx.fillText(p.class.toUpperCase(), x, y > 10 ? y - 5 : 10);
        });
    }

    async function updateSoundscape(apiKey) {
        if(detectedObjects.length === 0) return;

        const objects = detectedObjects.map(o => o.class).join(", ");
        document.getElementById('detected').innerText = `Scene: ${objects}`;

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${apiKey}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "llama-3.1-8b-instant",
                    messages: [{
                        role: "user",
                        content: `Based on these objects: ${objects}, suggest a musical chord (e.g. Cmaj7) and a mood (calm, dark, bright). Respond in JSON format: {"chord": "string", "freq": "number"}`
                    }],
                    response_format: { type: "json_object" }
                })
            });

            const data = await response.json();
            const aiLogic = JSON.parse(data.choices[0].message.content);
            
            // Trigger Audio based on AI logic
            playAmbient(aiLogic.chord);
            document.getElementById('audio-state').innerText = `Synth: ${aiLogic.chord} (${objects})`;
        } catch (e) {
            console.error("Groq Error", e);
        }
    }

    function playAmbient(chord) {
        // Map common chords to frequencies if needed, or use Tone.js strings
        const now = Tone.now();
        synth.triggerAttackRelease(chord, "4n", now);
    }
</script>
</body>
</html>
