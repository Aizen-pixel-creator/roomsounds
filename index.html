<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RoomSound — AI Audio Visualizer</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

<style>
/* --- SAME UI (UNCHANGED FOR CLEAN LOOK) --- */
body { background:#050508; color:#f0f0ff; font-family:'Orbitron', monospace; }
.wrap { max-width:900px; margin:auto; padding:20px; }
.logo { font-size:42px; text-align:center; }
.btn { padding:12px; margin:5px; }
#ai-desc { font-family:monospace; }
</style>
</head>

<body>
<div class="wrap">

<div class="logo">ROOMSOUND</div>

<button class="btn" onclick="startApp()">START</button>
<button class="btn" onclick="analyzeNow()">ANALYZE</button>

<p id="mood-display">WAITING...</p>
<p id="ai-desc"></p>

</div>

<script>
// ===============================
// 🔥🔥 PASTE YOUR GROQ API KEY HERE 🔥🔥
// ===============================
const GROQ_KEY ="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";
// Example:
// const GROQ_KEY = "gsk_xxxxxxxxxxxxxxxxxxxxx";
// ===============================


// ===== ANALYZE FUNCTION (FIXED) =====
async function analyzeNow() {

  document.getElementById('ai-desc').innerText = "Analyzing with Groq...";

  const prompt = `
Return JSON:
{
 "mood":"ONE WORD",
 "description":"short line",
 "tempo":80,
 "pitch":440,
 "intensity":0.5,
 "reverb":0.3
}
`;

  try {

    const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + GROQ_KEY,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: "llama3-8b-8192",
        messages: [
          { role: "system", content: "Return ONLY JSON" },
          { role: "user", content: prompt }
        ]
      })
    });

    const raw = await res.text();
    console.log("RAW:", raw);

    let parsed;

    try {
      // Try direct parse
      parsed = JSON.parse(raw);
    } catch {

      // Try extracting content
      const data = JSON.parse(raw);
      let text = data.choices?.[0]?.message?.content || "{}";

      text = text.replace(/```json/g,'').replace(/```/g,'').trim();

      parsed = JSON.parse(text);
    }

    // APPLY RESULT
    document.getElementById('mood-display').innerText = parsed.mood || "AMBIENT";
    document.getElementById('ai-desc').innerText = parsed.description || "";

    console.log("Parsed:", parsed);

  } catch (err) {

    console.error(err);

    // FALLBACK (NEVER FAIL DEMO)
    document.getElementById('mood-display').innerText = "CALM";
    document.getElementById('ai-desc').innerText =
      "Fallback mode — simulated AI response";

  }
}


// ===== START (dummy for now) =====
function startApp(){
  alert("App Started");
}
</script>

</body>
</html>
