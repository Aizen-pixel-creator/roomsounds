<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ROOMSOUND AI</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #050816;
  color: #00f0ff;
}

/* GRID BACKGROUND */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background-image: linear-gradient(rgba(0,255,255,0.05) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(0,255,255,0.05) 1px, transparent 1px);
  background-size: 40px 40px;
  z-index: -1;
}

/* TITLE */
.title {
  text-align: center;
  font-size: 48px;
  margin-top: 20px;
  letter-spacing: 4px;
}

/* PANEL */
.panel {
  width: 85%;
  margin: 20px auto;
  padding: 20px;
  border-radius: 15px;
  background: rgba(0,0,0,0.6);
  border: 1px solid rgba(0,255,255,0.2);
  box-shadow: 0 0 20px rgba(0,255,255,0.1);
}

/* FLEX */
.flex {
  display: flex;
  gap: 20px;
}

/* VIDEO + CANVAS */
video, canvas {
  width: 100%;
  border-radius: 10px;
  background: black;
}

/* BUTTONS */
button {
  padding: 12px 20px;
  margin: 10px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(45deg, #00f0ff, #7c3aed);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

/* AI OUTPUT */
#aiOutput {
  margin-top: 10px;
  font-size: 18px;
  color: #00ffcc;
}
</style>
</head>

<body>

<div class="title">ROOMSOUND</div>

<div class="panel">
  <button onclick="startMic()">🎤 START AUDIO</button>
  <button onclick="startCam()">📷 START CAMERA</button>
  <button onclick="runAI()">🤖 ANALYZE</button>
</div>

<div class="panel flex">
  <div style="flex:1">
    <h3>LIVE FEED</h3>
    <video id="video" autoplay muted></video>
  </div>

  <div style="flex:1">
    <h3>VISUALIZER</h3>
    <canvas id="canvas"></canvas>
  </div>
</div>

<div class="panel">
  <h3>AI ANALYSIS</h3>
  <p id="aiOutput">Waiting...</p>
</div>

<script>

// =======================================
// 🔥 PASTE YOUR GROQ API KEY HERE
// =======================================
const GROQ_API_KEY = "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";
// Example:
// const GROQ_API_KEY = "gsk_xxxxxxxxxxxxxxxxx";
// =======================================


// AUDIO VISUALIZER
let analyser, dataArray;

function startMic() {
  navigator.mediaDevices.getUserMedia({ audio: true })
  .then(stream => {
    const ctx = new AudioContext();
    const src = ctx.createMediaStreamSource(stream);

    analyser = ctx.createAnalyser();
    analyser.fftSize = 256;

    src.connect(analyser);
    dataArray = new Uint8Array(analyser.frequencyBinCount);

    draw();
  });
}

function draw() {
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;

  function animate() {
    requestAnimationFrame(animate);

    analyser.getByteFrequencyData(dataArray);

    ctx.fillStyle = "rgba(0,0,0,0.2)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    let barWidth = canvas.width / dataArray.length;

    for (let i = 0; i < dataArray.length; i++) {
      let h = dataArray[i];

      ctx.fillStyle = `hsl(${h*2 + Date.now()/20},100%,60%)`;
      ctx.fillRect(i * barWidth, canvas.height - h, barWidth - 2, h);
    }
  }

  animate();
}

// CAMERA
function startCam() {
  navigator.mediaDevices.getUserMedia({ video: true })
  .then(stream => {
    document.getElementById("video").srcObject = stream;
  });
}


// 🔥 REAL GROQ API CALL
async function runAI() {

  document.getElementById("aiOutput").innerText = "Analyzing with Groq...";

  try {
    const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + GROQ_API_KEY,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: "mixtral-8x7b-32768",
        messages: [
          {
            role: "user",
            content: "Describe the mood of a room based on ambient sound in one short line"
          }
        ]
      })
    });

    const data = await response.json();

    document.getElementById("aiOutput").innerText =
      data.choices[0].message.content;

  } catch (err) {
    document.getElementById("aiOutput").innerText =
      "⚠️ Error: Check API Key or Network";
  }
}

</script>

</body>
</html>
